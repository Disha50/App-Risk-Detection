<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #020617);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Cloud Background */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle at 20% 30%, #1e3a8a 0%, transparent 30%),
                      radial-gradient(circle at 80% 40%, #1e40af 0%, transparent 30%),
                      radial-gradient(circle at 50% 80%, #2563eb 0%, transparent 30%);
    opacity: 0.5;
}

/* Login Card */
.login-box {
    position: relative;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 40px;
    width: 360px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(59,130,246,0.4);
    text-align: center;
    color: white;
}

/* Avatar */
.avatar {
    width: 90px;
    height: 90px;
    background: linear-gradient(135deg, #38bdf8, #2563eb);
    border-radius: 50%;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 15px;
}

h2 {
    margin-bottom: 5px;
}

p {
    font-size: 14px;
    color: #cbd5f5;
    margin-bottom: 25px;
}

/* Inputs */
.input-box {
    width: 100%;
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
}

.input-box input::placeholder {
    color: #cbd5f5;
}

/* Options */
.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 20px;
    color: #cbd5f5;
}

.options a {
    color: #60a5fa;
    text-decoration: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #38bdf8, #2563eb);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #3b82f6;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="avatar">👤</div>
    <h2>LOGIN</h2>
    <p>Welcome</p>

    <div class="input-box">
        <input type="text" placeholder="USER NAME">
    </div>

    <div class="input-box">
        <input type="password" placeholder="PASSWORD">
    </div>

    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
    </div>

    <button>LOGIN</button>
</div>

</body>
</html>
